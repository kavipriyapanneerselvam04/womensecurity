<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Fence</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="logo brand-wrap"><div class="brand-text">SafeHer</div><img class="brand-logo" src="{{ url_for('static', filename='images/safeher-logo.svg') }}" alt="SafeHer Logo"></div>
            <nav class="menu">
                <a href="/dashboard">Dashboard</a>
                <a href="/live-location">Live Tracking</a>
                <a class="active" href="/geofence-page">Geo-Fence</a>
                <a href="/device-status">Device Status</a>
                <a href="/user-management">User Management</a>
                <a href="/alert-history">Alert History</a>
                <a href="/self-defense">Self Defense</a>
                <a href="/profile-page">Profile</a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-danger menu-logout" type="button" onclick="wsApp.logoutUser()">Logout</button>
            </div>
        </aside>
        <main class="main">
            <div class="topbar">
                <h1>Geo-Fence Monitoring</h1>
                <div class="muted" style="color:#f0eaff;">Safe radius: 500 meters</div>
                <div class="topbar-actions">
                    <button class="btn btn-ghost theme-toggle" type="button" aria-label="Toggle theme"><span class="theme-icon">&#9789;</span></button>
                </div>
            </div>
            <div class="card">
                <form onsubmit="wsApp.saveBoundarySettings(event)">
                    <label for="centerLatitude">Center Latitude</label>
                    <input id="centerLatitude" type="number" step="0.000001" required>
                    <label for="centerLongitude">Center Longitude</label>
                    <input id="centerLongitude" type="number" step="0.000001" required>
                    <label for="radiusMeters">Boundary Radius (meters)</label>
                    <input id="radiusMeters" type="number" step="1" min="50" required>
                    <div class="action-row" style="margin-top:10px;">
                        <button class="btn btn-primary" type="button" onclick="wsApp.setBoundaryFromCurrentLocation()">Set Boundary From My Current Location</button>
                        <button class="btn btn-warn" type="submit">Save Boundary</button>
                    </div>
                </form>
                <p id="geofenceMessage" class="muted"></p>
                <p class="muted">If device crosses boundary, a boundary alert is auto-generated and SMS is triggered.</p>
                <div id="geofenceMap"></div>
            </div>
        </main>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
    <script>
        (async () => {
            await wsApp.ensureSession();
            wsApp.initTheme();
            wsApp.loadGeofenceSettings();
            initGeofenceMap();
        })();
    </script>
</body>
</html>
